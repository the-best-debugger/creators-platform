name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MONGODB_URI_TEST: mongodb://127.0.0.1:27017/creator-platform-test
      JWT_SECRET: test_jwt_secret
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install server dependencies
        run: |
          cd server
          npm install

      - name: Wait for MongoDB
        run: |
          echo "Waiting for MongoDB to be ready..."
          for i in `seq 1 30`; do
            if bash -c "</dev/tcp/127.0.0.1/27017"; then
              echo "MongoDB is up"
              break
            fi
            echo "Waiting ($i/30)..."
            sleep 1
          done

      - name: Run server tests
        run: |
          cd server
          npm test

      - name: Install client dependencies
        run: |
          cd client
          npm install

      - name: Run client tests
        run: |
          cd client
          npm test